<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diajex Multiplayer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f4f4f9;
    }

    h1 {
      margin-bottom: 10px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(5, 50px);
      grid-gap: 5px;
      margin-bottom: 20px;
    }

    .cell {
      width: 50px;
      height: 50px;
      background-color: blue;
      border: 1px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      position: relative;
    }

    .cell.white {
      background-color: white;
    }

    .info {
      margin-bottom: 10px;
    }

    .btn {
      padding: 10px 15px;
      font-size: 16px;
      cursor: pointer;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
    }

    .btn:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <h1>Diajex Multiplayer</h1>
  <div class="info">Player <span id="current-player">1</span>'s turn</div>
  <div class="board" id="board"></div>
  <button class="btn" id="restart-btn">Restart Game</button>

  <script>
    const boardElement = document.getElementById('board');
    const currentPlayerElement = document.getElementById('current-player');
    const restartButton = document.getElementById('restart-btn');

    const BOARD_SIZE = 5;
    let board = [];
    let currentPlayer = 1;

    // Connect to WebSocket server (replace with your WebSocket server URL)
    const socket = new WebSocket('ws://your-websocket-server-url'); 

    socket.onmessage = function (event) {
      const data = JSON.parse(event.data);
      board = data.board;
      currentPlayer = data.currentPlayer;
      updateBoard();
      currentPlayerElement.textContent = currentPlayer;
    };

    // Create and update the board
    function updateBoard() {
      boardElement.innerHTML = ''; // Clear the board
      board.forEach((row, rowIndex) => {
        row.forEach((cell, colIndex) => {
          const cellElement = document.createElement('div');
          cellElement.classList.add('cell');
          if (board[rowIndex][colIndex] === 'white') {
            cellElement.classList.add('white');
          }
          cellElement.addEventListener('click', () => handleCellClick(rowIndex, colIndex));
          boardElement.appendChild(cellElement);
        });
      });
    }

    // Handle click on a cell
    function handleCellClick(row, col) {
      if (board[row][col] === 'white') {
        alert(`Player ${currentPlayer}, you can't select this tile again!`);
        return;
      }

      // Send the move to the WebSocket server
      socket.send(JSON.stringify({ type: 'move', row, col, player: currentPlayer }));
    }

    // Listen for restart button click
    restartButton.addEventListener('click', () => {
      socket.send(JSON.stringify({ type: 'restart' }));
    });

    // Initialize the board when connection is established
    socket.onopen = function () {
      console.log('Connected to WebSocket server');
      // Initialize the game state for the first time
      board = Array.from({ length: BOARD_SIZE }, () => Array(BOARD_SIZE).fill(null));
      updateBoard();
    };

  </script>
</body>
</html>
